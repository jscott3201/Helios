name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  bootstrap:
    name: Bootstrap verification
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: rustup show

      - name: Verify workspace
        run: make verify
